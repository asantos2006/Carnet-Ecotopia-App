<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carné de Ecotópico</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
<div id="toast-notificacion" class="toast-oculto"></div>

    <!-- MODAL DE VERIFICACIÓN DE CÓDIGO -->
    <div id="modal-codigo-registro" class="modal-oculto" style="display: flex;">
        <div class="contenido-modal" style="max-width: 340px;">
            <h3 style="color: #62c566; margin-bottom: 10px;">🔑 Código de Acceso</h3>
            <p style="color: #c4c4c4; font-size: 0.85em; margin-bottom: 20px;">
                Introduce el código de 4 dígitos que te ha proporcionado la asociación.
            </p>
            <input 
                type="text" 
                id="input-codigo-verificacion" 
                placeholder="- - - -"
                maxlength="4"
                inputmode="numeric"
                pattern="[0-9]*"
                style="text-align: center; font-size: 1.2em; letter-spacing: 0.5em; padding: 10px;"
            >
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-secundario" onclick="window.location.href='index.html'" style="flex: 1; border-color: #ff4d4d; color: #ff4d4d;">
                    Cancelar
                </button>
                <button class="btn-puntos" onclick="verificarCodigoRegistro()" style="flex: 1;">
                    Verificar
                </button>
            </div>
        </div>
    </div>

    <!-- FORMULARIO DE REGISTRO (oculto hasta verificar código) -->
    <div id="contenedor-registro" style="display: none; width: 100%; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="tarjeta">
            <img src="assets/logo_ecotopia.png" alt="Logo Ecotopía" class="logo">
            <h2>Registro de Ecotópico</h2>
            
            <form id="formulario-registro" onsubmit="registrarUsuario(event)">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" placeholder="Ej. Ana García" required>
                
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
                
                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                
                <div class="grupo-botones">
                    <button type="submit" class="btn-principal">Crear Carné</button>
                    <button type="button" class="btn-secundario" onclick="window.location.href='index.html'">
                        Volver al Login
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/firebase.config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/registro.js"></script>
</body>
</html>
