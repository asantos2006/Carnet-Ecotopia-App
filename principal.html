<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carnet Ecotópico</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <!-- Librería QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="js/firebase.config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/estudiante.js"></script>
</head>

<body>
    <div id="toast-notificacion" class="toast-oculto"></div>

    <div class="tarjeta app-principal">

        <!-- ALERTAS DE PRÓXIMOS EVENTOS -->
        <div id="alertas-proximos-eventos"></div>

        <!-- MODAL DETALLE EVENTO -->
        <div id="modal-detalle-evento" class="modal-oculto">
            <div class="contenido-modal" style="max-width: 400px; text-align: left;">
                <h3 id="detalle-nombre" style="color: #62c566; text-align: center; margin-bottom: 5px;"></h3>
                <p id="detalle-categoria" style="color: var(--color-primary-light); font-size: 0.75em; text-align: center; margin-bottom: 15px;"></p>

                <div id="detalle-fecha-lugar" style="background: rgba(255,255,255,0.05); border-radius: 8px; padding: 10px; margin-bottom: 12px; font-size: 0.85em; color: #c4c4c4; display: flex; flex-direction: column; gap: 5px;"></div>

                <div id="detalle-descripcion-bloque" style="margin-bottom: 12px;">
                    <p id="detalle-descripcion" style="color: #c4c4c4; font-size: 0.85em; line-height: 1.5;"></p>
                </div>

                <div id="detalle-ponentes-bloque" style="margin-bottom: 15px;">
                    <p style="color: var(--color-primary-light); font-size: 0.8em; font-weight: bold; margin-bottom: 6px;">🎙️ Ponentes</p>
                    <div id="detalle-ponentes"></div>
                </div>

                <div style="background: rgba(98,197,102,0.1); border: 1px solid rgba(98,197,102,0.3); border-radius: 8px; padding: 10px; text-align: center; margin-bottom: 15px;">
                    <span style="color: #a4f5a7; font-size: 0.8em;"> <span id="detalle-puntos" style="color: #62c566; font-weight: bold;"></span> EcoPoints por asistir</span> 
                </div>

                <button class="btn-secundario" onclick="cerrarModalDetalleEvento()" style="width: 100%; border-color: #ff4d4d; color: #ff4d4d;">
                    ⬅️ Cerrar
                </button>
            </div>
        </div>
        
           <!-- SECCIÓN 1: Carné — Nombre + EcoPoints + QR -->
    <div class="perfil-usuario">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <div>
                <p style="color: var(--color-primary-light); font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px;">Carné Ecotópico</p>
                <h3 id="nombre-usuario" style="color: white; font-size: 1.2em;">Cargando...</h3>
            </div>
            <div style="text-align: right;">
                <p style="color: var(--color-primary-light); font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px;">EcoPoints</p>
                <span id="stat-puntos" style="color: var(--color-primary-dark); font-weight: bold; font-size: 1.4em;">—</span>
            </div>
        </div>
        <div id="qrcode"></div>
    </div>

    <hr class="separador">

    <!-- SECCIÓN 2: Actividades -->
    <div>

        <!-- Cabecera: título + botón actualizar -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <h4 style="color: var(--color-primary); font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px;">Actividades</h4>
            <button onclick="recargarDatosManual()" style="background: rgba(98,197,102,0.15); border: 1px solid var(--color-primary-dark); color: var(--color-primary-dark); border-radius: 20px; padding: 3px 10px; font-size: 0.65em; cursor: pointer; font-weight: bold;">
                🔄
            </button>
        </div>

        <!-- Racha -->
        <div style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
            <span style="color: var(--color-text-muted); font-size: 0.8em;">Racha últimos 30 días</span>
            <span id="stat-racha" style="color: var(--color-primary-light); font-weight: bold; font-size: 1em;">— 🔥</span>
        </div>

        <!-- Barra de progreso -->
        <div style="margin-bottom: 6px;">
            <div style="background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden;">
                <div id="barra-progreso-perfil" style="height: 100%; width: 0%; background: var(--color-primary-dark); border-radius: 4px; box-shadow: 0 0 8px rgba(98,197,102,0.5); transition: width 0.6s ease;"></div>
            </div>
        </div>
        <p id="texto-progreso" style="color: var(--color-text-muted); font-size: 0.75em; margin-bottom: 16px;">Cargando...</p>

        <!-- Lista de eventos -->
        <div id="lista-actividades-usuario" class="contenedor-actividades">
            <p id="mensaje-vacio" style="font-size: 0.8em; color: rgba(255,255,255,0.5);">Aún no has participado en eventos.</p>
        </div>

    </div>

    <hr class="separador">

    <!-- SECCIÓN 3: Cerrar sesión -->
    <div id="boton-volver-admin" style="display: none;">
        <button class="btn-secundario" onclick="window.location.href='admin.html'" style="border-color: #a4f5a7; color: #a4f5a7; width: 100%; margin-bottom: 10px;">
            ⚙️ Panel Admin
        </button>
    </div>
    <button class="btn-secundario" onclick="cerrarSesion()">CERRAR SESIÓN</button>

    </div>

</body>
</html>
